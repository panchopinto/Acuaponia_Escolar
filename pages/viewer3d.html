<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visor 3D · Acuaponía Escolar</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    body{margin:0;font-family:Inter,system-ui,sans-serif;background:#08111f;color:#e5eefc;display:grid;place-items:center;min-height:100vh;padding:24px}
    .card{max-width:1100px;width:100%;background:rgba(15,23,42,.8);border:1px solid rgba(148,163,184,.18);border-radius:24px;padding:20px;box-sizing:border-box}
    model-viewer{width:100%;height:70vh;background:linear-gradient(180deg,#0f172a,#020617);border-radius:20px}
    a{color:#38bdf8;text-decoration:none}
  </style>
</head>
<body>
  <div class="card">
    <h1>👁️ Visor 3D del sistema acuapónico</h1>
    <p>Reemplaza el atributo <code>src</code> por tu modelo <code>.glb</code> en <code>assets/models/</code>.</p>
    <model-viewer src="../assets/models/acuaponia.glb" camera-controls auto-rotate ar ar-modes="webxr scene-viewer quick-look" alt="Modelo 3D de acuaponía"></model-viewer>
    <p><a href="../index.html">← Volver al inicio</a></p>
  </div>
</body>
</html>
